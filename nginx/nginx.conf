worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=pos:10m rate=10r/s;

    upstream backend {
        server backend:3000;
    }

    upstream evolution {
        server evolution-api:8080;
    }

    # HTTP server - Support both IP and domain
    server {
        listen 80;
        server_name _ qr.365whatsapp.com;

        location /api/pos/ {
            limit_req zone=pos burst=20 nodelay;
            proxy_pass http://backend/api/pos/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/web/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://backend/api/web/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }

    # HTTPS server (uncomment when SSL certs are ready)
    # server {
